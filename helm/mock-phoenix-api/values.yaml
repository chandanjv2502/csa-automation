# Default values for mock-phoenix-api
namespace: csa-clone

replicaCount: 1

image:
  repository: 44.202.63.187:8083/csa/mock-phoenix-api
  tag: "1.0.0"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: nexus-registry-secret

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::524997768738:role/csa-poc-service-role
  name: ""

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::524997768738:role/csa-poc-service-role

containerPort: 8080

resources:
  limits:
    cpu: 300m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5

labels:
  app: mock-phoenix-api
  component: backend

nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

nodeSelector: {}

tolerations: []

affinity: {}

env: []

envFrom: []
