apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-ui
  namespace: csa-poc
  labels:
    app: frontend-ui
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-ui
  template:
    metadata:
      labels:
        app: frontend-ui
        component: frontend
    spec:
      containers:
      - name: frontend-ui
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-ui
  namespace: csa-poc
  labels:
    app: frontend-ui
spec:
  type: ClusterIP
  selector:
    app: frontend-ui
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
