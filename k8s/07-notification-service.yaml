apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: csa-clone
  labels:
    app: notification-service
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        component: backend
    spec:
      containers:
      - name: notification-service
        image: python:3.11-slim
        command: ["python", "-m", "http.server", "8085"]
        ports:
        - containerPort: 8085
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: csa-clone
  labels:
    app: notification-service
spec:
  type: ClusterIP
  selector:
    app: notification-service
  ports:
  - port: 8085
    targetPort: 8085
    protocol: TCP
    name: http
