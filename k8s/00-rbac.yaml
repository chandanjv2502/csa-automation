# RBAC configuration for GitHub Actions CI/CD user
# This allows the github-actions-csa-deploy IAM user (mapped to csa-deployers group)
# to deploy and manage resources in the csa-poc namespace

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: csa-deployer
  namespace: csa-poc
rules:
  # Core resources for application deployments
  - apiGroups: [""]
    resources:
      - services
      - pods
      - secrets              # Required for Helm release metadata
      - serviceaccounts      # Required for pod service accounts
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

  # Deployment resources
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

  # Ingress resources for ALB
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: csa-deployer-binding
  namespace: csa-poc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: csa-deployer
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: csa-deployers
