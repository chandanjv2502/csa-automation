apiVersion: apps/v1
kind: Deployment
metadata:
  name: siren-load
  namespace: csa-clone
  labels:
    app: siren-load
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: siren-load
  template:
    metadata:
      labels:
        app: siren-load
        component: backend
    spec:
      containers:
      - name: siren-load
        image: python:3.11-slim
        command: ["python", "-m", "http.server", "8084"]
        ports:
        - containerPort: 8084
          name: http
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 300m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: siren-load
  namespace: csa-clone
  labels:
    app: siren-load
spec:
  type: ClusterIP
  selector:
    app: siren-load
  ports:
  - port: 8084
    targetPort: 8084
    protocol: TCP
    name: http
