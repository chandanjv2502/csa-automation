name: Deploy to EKS

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Verify authentication
        run: |
          echo "Verifying deployment permissions in csa-poc namespace..."
          kubectl auth can-i create deployments -n csa-poc || exit 1
          kubectl auth can-i create services -n csa-poc || exit 1
          echo "✅ Permissions verified!"

      - name: Deploy to Kubernetes
        run: |
          echo "Deploying to namespace: csa-poc"
          kubectl apply -f k8s/

      - name: Verify deployment
        run: |
          echo "Waiting for deployments to be ready..."
          kubectl rollout status deployment/frontend-ui -n csa-poc --timeout=2m || true
          kubectl rollout status deployment/contract-discovery -n csa-poc --timeout=2m || true
          kubectl rollout status deployment/ai-extraction -n csa-poc --timeout=2m || true
          echo ""
          echo "Deployment successful! Listing pods:"
          kubectl get pods -n csa-poc
          echo ""
          echo "Listing services:"
          kubectl get services -n csa-poc
