name: Deploy to EKS

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Verify authentication
        run: |
          echo "Verifying deployment permissions in csa-poc namespace..."
          kubectl auth can-i create deployments -n csa-poc || exit 1
          kubectl auth can-i create services -n csa-poc || exit 1
          kubectl auth can-i create ingresses -n csa-poc || exit 1
          kubectl auth can-i create secrets -n csa-poc || exit 1
          kubectl auth can-i create serviceaccounts -n csa-poc || exit 1
          echo "✅ Permissions verified!"

      - name: Deploy services using Helm
        run: |
          echo "Deploying CSA services to namespace: csa-poc"

          # Deploy frontend-ui
          helm upgrade --install frontend-ui ./helm/frontend-ui \
            --namespace csa-poc \
            --create-namespace \
            --wait \
            --timeout 5m

          # Note: Add other services here as their Helm charts are created
          # helm upgrade --install contract-discovery ./helm/contract-discovery --namespace csa-poc --wait
          # helm upgrade --install contract-ingestion ./helm/contract-ingestion --namespace csa-poc --wait
          # etc.

          echo "✅ Helm deployments complete!"

      - name: Verify deployment
        run: |
          echo "Waiting for deployments to be ready..."
          kubectl rollout status deployment/frontend-ui -n csa-poc --timeout=2m || true
          kubectl rollout status deployment/contract-discovery -n csa-poc --timeout=2m || true
          kubectl rollout status deployment/ai-extraction -n csa-poc --timeout=2m || true
          echo ""
          echo "Deployment successful! Listing pods:"
          kubectl get pods -n csa-poc
          echo ""
          echo "Listing services:"
          kubectl get services -n csa-poc
          echo ""
          echo "Listing Ingress resources:"
          kubectl get ingress -n csa-poc
          echo ""
          echo "Waiting for ALB to be provisioned (this may take 2-3 minutes)..."
          sleep 30
          kubectl get ingress csa-frontend-ingress -n csa-poc -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' || echo "ALB not ready yet"
