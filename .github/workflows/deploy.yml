name: Deploy to EKS

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual trigger from GitHub UI
    inputs:
      service:
        description: 'Service to deploy (leave empty to deploy all)'
        required: false
        type: choice
        options:
          - ''
          - frontend-ui
          - contract-discovery
          - contract-ingestion
          - ai-extraction
          - csa-routing
          - siren-load
          - notification-service
          - mock-phoenix-api
          - mock-siren-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Verify authentication
        run: |
          echo "Verifying deployment permissions in csa-poc namespace..."
          kubectl auth can-i create deployments -n csa-poc || exit 1
          kubectl auth can-i create services -n csa-poc || exit 1
          kubectl auth can-i create ingresses -n csa-poc || exit 1
          kubectl auth can-i create secrets -n csa-poc || exit 1
          kubectl auth can-i create serviceaccounts -n csa-poc || exit 1
          echo "✅ Permissions verified!"

      - name: Deploy services using Helm
        run: |
          echo "Deploying CSA services to namespace: csa-poc"

          # Check if specific service was selected via workflow_dispatch
          if [ -n "${{ github.event.inputs.service }}" ]; then
            echo "Manual deployment triggered for service: ${{ github.event.inputs.service }}"
            services=("${{ github.event.inputs.service }}")
          else
            echo "Deploying all services (triggered by push or manual 'all')"
            # Deploy all 9 services
            services=(
              "frontend-ui"
              "contract-discovery"
              "contract-ingestion"
              "ai-extraction"
              "csa-routing"
              "siren-load"
              "notification-service"
              "mock-phoenix-api"
              "mock-siren-api"
            )
          fi

          for service in "${services[@]}"; do
            echo "Deploying $service..."
            helm upgrade --install $service ./helm/$service \
              --namespace csa-poc
            echo "✅ $service Helm release updated"
          done

          echo ""
          echo "✅ All Helm releases updated! Waiting for pods to be ready..."
          sleep 10

      - name: Verify deployment
        run: |
          echo "Waiting for deployments to be ready..."

          # Check if specific service was selected
          if [ -n "${{ github.event.inputs.service }}" ]; then
            services=("${{ github.event.inputs.service }}")
          else
            # Check rollout status for all 9 services
            services=(
              "frontend-ui"
              "contract-discovery"
              "contract-ingestion"
              "ai-extraction"
              "csa-routing"
              "siren-load"
              "notification-service"
              "mock-phoenix-api"
              "mock-siren-api"
            )
          fi

          for service in "${services[@]}"; do
            echo "Checking rollout status for $service..."
            kubectl rollout status deployment/$service -n csa-poc --timeout=2m || true
          done

          echo ""
          echo "Deployment successful! Listing all pods:"
          kubectl get pods -n csa-poc -o wide
          echo ""
          echo "Listing all services:"
          kubectl get services -n csa-poc
          echo ""
          echo "Listing Helm releases:"
          helm list -n csa-poc
          echo ""
          echo "Listing Ingress resources:"
          kubectl get ingress -n csa-poc
          echo ""
          echo "Waiting for ALB to be provisioned (this may take 2-3 minutes)..."
          sleep 30
          kubectl get ingress csa-frontend-ingress -n csa-poc -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' || echo "ALB not ready yet"
