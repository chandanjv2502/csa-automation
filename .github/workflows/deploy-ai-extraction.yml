name: Deploy AI Extraction

on:
  push:
    branches:
      - main
    paths:
      - 'src/ai-extraction/**'
      - 'helm/ai-extraction/**'
      - '.github/workflows/deploy-ai-extraction.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure Docker for insecure registry
        run: |
          echo '{"insecure-registries": ["98.92.113.55:8083"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          sleep 5

      - name: Login to Nexus
        run: |
          echo "${{ secrets.NEXUS_PASSWORD }}" | docker login 98.92.113.55:8083 \
            --username ${{ secrets.NEXUS_USERNAME }} \
            --password-stdin

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build and push Docker image to Nexus
        env:
          NEXUS_REGISTRY: "98.92.113.55:8083"
          SERVICE: "ai-extraction"
          VERSION: "1.0.0"
        run: |
          echo "Building $SERVICE..."
          docker build -t $NEXUS_REGISTRY/csa/$SERVICE:$VERSION \
                       -t $NEXUS_REGISTRY/csa/$SERVICE:latest \
                       ./src/$SERVICE/

          echo "Pushing to Nexus..."
          docker push $NEXUS_REGISTRY/csa/$SERVICE:$VERSION
          docker push $NEXUS_REGISTRY/csa/$SERVICE:latest

          echo "✅ Image pushed successfully"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Deploy ai-extraction using Helm
        run: |
          echo "Deploying ai-extraction to namespace: csa-clone"

          helm upgrade --install ai-extraction ./helm/ai-extraction \
            --namespace csa-clone \
            --timeout 5m

          echo "✅ ai-extraction deployed successfully"

      - name: Verify deployment
        run: |
          echo "Checking rollout status..."
          kubectl rollout status deployment/ai-extraction -n csa-clone --timeout=2m

          echo ""
          echo "Pod status:"
          kubectl get pods -n csa-clone -l app=ai-extraction

          echo ""
          echo "Service status:"
          kubectl get service ai-extraction -n csa-clone
